# 必读！！！
# 机场订阅
proxy-providers:
  bywave:
    url: "aaaa"
    type: http
    interval: 21600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 60
    proxy: 直连

  bywave2:
    url: "bbbb"
    type: http
    interval: 21600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 60
    proxy: 🚀 默认代理

# 节点信息
proxies:
  - {name: 直连, type: direct}

# 全局配置 
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: 'off'
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# ══ 地理数据 ══
geo-auto-update: true
geo-update-interval: 24
geodata-mode: true
geox-url:
  geosite: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  geoip:   https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  mmdb:    https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb
  asn:     https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb

# Zashboard 控制面板配置
external-controller: 0.0.0.0:9090
external-ui: "/usr/share/openclash/ui"
external-ui-name: zashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/download/v3.15.0/dist-misans-only.zip"
secret: OpenClash

# 嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
    - "+.linkedin.com"
  skip-domain:
    - "+.baidu.com"
    - "Mijia Cloud"
    - "+.qq.com"

# 入站 
tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# DNS 模块 (精简优化 fake-ip 模式)
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "rule-set:private_domain,cn_domain"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.*.com"
    - "+.market.xiaomi.com"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - tls://8.8.4.4
    - tls://1.1.1.1
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

# 出站策略
proxy-groups:
  # 核心策略组
  - {name: 🚀 默认代理, type: select, client-fingerprint: chrome, proxies: [ 🔯 香港故转, 🔯 日本故转, 🔯 狮城故转, 🔯 美国故转, ♻️ 香港自动, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 美国自动, 🌐 全部节点, 直连]}
  - {name: 🌐 全部节点, type: select, include-all: true, filter: "^((?!(直连|Traffic|Expire|剩余|重置|到期|延迟|过期)).)*$"}
  - {name: 🍀 Google & Gemini, type: select, client-fingerprint: chrome, proxies: [ 🔯 日本故转, 🔯 美国故转, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 美国自动, 🚀 默认代理, 🌐 全部节点, 直连]}
  - {name: 🤖 AI Services, type: select, client-fingerprint: chrome, proxies: [ 🔯 美国故转, ♻️ 美国自动, 🇺🇲 美国节点, ♻️ 日本自动, ♻️ 狮城自动, 🌐 全部节点]}
  - {name: 🏢 Company, type: select, client-fingerprint: chrome, proxies: [ 🔯 日本故转, 🔯 美国故转, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 美国自动, 🚀 默认代理, 🌐 全部节点]}
  - {name: 🗽 US-Proxy, type: select, client-fingerprint: chrome, proxies: [ 🔯 美国故转, ♻️ 美国自动, 🇺🇲 美国节点, ♻️ 日本自动, ♻️ 狮城自动, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🌐 全部节点]}
  - {name: 👨🏿‍💻 GitHub, type: select, proxies: [ 🔯 香港故转, 🔯 日本故转, 🔯 狮城故转, 🔯 美国故转, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 美国自动, 🚀 默认代理, 🌐 全部节点, 直连]}
  - {name: 📹 YouTube, type: select, proxies: [ 🔯 香港故转, 🔯 日本故转, 🔯 狮城故转, 🔯 美国故转, ♻️ 香港自动, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 美国自动, 🚀 默认代理, 🌐 全部节点, 直连]}
  - {name: 🎵 TikTok, type: select, proxies: [ ♻️ 美国自动, ♻️ 狮城自动, 🌐 全部节点]}
  - {name: 📲 Telegram, type: select, proxies: [ 🚀 默认代理, ♻️ 香港自动, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 美国自动, 🌐 全部节点]}
  - {name: 🎥 NETFLIX, type: select, proxies: [ 🚀 默认代理, ♻️ 香港自动, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 美国自动, 🌐 全部节点]}
  - {name: 💶 PayPal, type: select, proxies: [ 🔯 美国故转, 🚀 默认代理, ♻️ 香港自动, ♻️ 美国自动, 🌐 全部节点]}
  - {name: 🐬 OneDrive, type: select, proxies: [ 直连, 🌐 全部节点, 🚀 默认代理]}
  - {name: 🪟 Microsoft, type: select, proxies: [ 直连, 🌐 全部节点, 🚀 默认代理]}
  - {name: 🐟 漏网之鱼, type: select, proxies: [ 直连, 🚀 默认代理, 🌐 全部节点]}

  # 地区故障转移
  - {name: 🔯 日本故转, type: fallback, url: https://cp.cloudflare.com/generate_204, interval: 60, timeout: 3000, lazy: false, proxies: [ 🇯🇵 日本节点, ♻️ 日本自动]}
  - {name: 🔯 狮城故转, type: fallback, url: https://cp.cloudflare.com/generate_204, interval: 60, timeout: 3000, lazy: false, proxies: [ 🇸🇬 狮城节点, ♻️ 狮城自动]}
  - {name: 🔯 香港故转, type: fallback, url: https://cp.cloudflare.com/generate_204, interval: 60, timeout: 3000, lazy: false, proxies: [ 🇭🇰 香港节点, ♻️ 香港自动]}
  - {name: 🔯 美国故转, type: fallback, url: https://cp.cloudflare.com/generate_204, interval: 60, timeout: 3000, lazy: false, proxies: [ 🇺🇲 美国节点, ♻️ 美国自动]}
  
  # Url-Test 自动测速组
  - {name: ♻️ 香港自动, type: url-test, url: https://cp.cloudflare.com/generate_204, client-fingerprint: chrome, interval: 60, timeout: 1000, max-failed-times: 2, tolerance: 50, include-all: true, filter: "(?i)^(?=.*(港|HK|Hong))(?!(.*(台|日|韩|新|美))).*$"}
  - {name: ♻️ 日本自动, type: url-test, url: https://cp.cloudflare.com/generate_204, client-fingerprint: chrome, interval: 60, timeout: 1000, max-failed-times: 2, tolerance: 50, include-all: true, filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"}
  - {name: ♻️ 狮城自动, type: url-test, url: https://cp.cloudflare.com/generate_204, client-fingerprint: chrome, interval: 60, timeout: 1000, max-failed-times: 2, tolerance: 50, include-all: true, filter: "(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(港|台|韩|日|美)).)*$"}
  - {name: ♻️ 美国自动, type: url-test, url: https://cp.cloudflare.com/generate_204, client-fingerprint: chrome, interval: 60, timeout: 1000, max-failed-times: 2, tolerance: 50, include-all: true, filter: "(?=.*(US|us|(?i)States|America))^((?!(港|台|日|韩|新)).)*$"}
  
  # 手动选择组
  - {name: 🇭🇰 香港节点, type: select, client-fingerprint: chrome, include-all: true, filter: "(?i)港|hk|hongkong|hong kong"}
  - {name: 🇯🇵 日本节点, type: select, client-fingerprint: chrome, include-all: true, filter: "(?i)日|jp|japan||c22s4"}
  - {name: 🇸🇬 狮城节点, type: select, client-fingerprint: chrome, include-all: true, filter: "(?i)新加坡|坡|狮城|sg|SG|Singapore"}
  - {name: 🇺🇲 美国节点, type: select, client-fingerprint: chrome, include-all: true, filter: "(?i)US|us|unitedstates|united states|us-vps|c22s1|c22s2|c22s3|c22s801"}
  - {name: NL 荷兰节点, type: select, client-fingerprint: chrome, include-all: true, filter: "(?i)c22s5"}

# 规则匹配
rules:
  - RULE-SET,direct_inc,DIRECT
  - RULE-SET,us_proxy_inc,🗽 US-Proxy
  - RULE-SET,proxy_inc, 🏢 Company
  
  # 【合并匹配】：OpenAI, Copilot, Cursor 及通用 AI 统统指向 🤖 AI Services
  - RULE-SET,google_domain,🍀 Google & Gemini
  - RULE-SET,google_gemini_domain,🍀 Google & Gemini
  - RULE-SET,openai,🤖 AI Services
  - RULE-SET,copilot,🤖 AI Services
  - RULE-SET,cursor,🤖 AI Services
  - RULE-SET,ai,🤖 AI Services

  - RULE-SET,private_ip,直连
  - RULE-SET,private_domain,直连
  - RULE-SET,github_domain,👨🏿‍💻 GitHub
  - RULE-SET,youtube_domain,📹 YouTube

  - RULE-SET,onedrive_domain,🐬 OneDrive
  - RULE-SET,microsoft_domain,🪟 Microsoft
  - RULE-SET,apple_domain,直连
  - RULE-SET,tiktok_domain,🎵 TikTok
  - RULE-SET,telegram_domain,📲 Telegram
  - RULE-SET,netflix_domain,🎥 NETFLIX
  - RULE-SET,paypal_domain,💶 PayPal
  - RULE-SET,apple_ip,直连,no-resolve
  - RULE-SET,google_ip,🍀 Google & Gemini,no-resolve
  - RULE-SET,netflix_ip,🎥 NETFLIX,no-resolve
  - RULE-SET,telegram_ip,📲 Telegram,no-resolve
  - RULE-SET,geolocation-!cn,🚀 默认代理
  - RULE-SET,cn_domain,直连
  - RULE-SET,cn_ip,直连
  - MATCH,🐟 漏网之鱼

# 规则集定义
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}
  class_yaml: &class_yaml {type: http, interval: 86400, behavior: classical, format: yaml}

rule-providers: 
  private_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"}
  us_proxy_inc: { <<: *class, url: "https://raw.githubusercontent.com/yuhongwei380/openclash-rules/main/us_proxy.list"}
  proxy_inc: { <<: *class, url: "https://raw.githubusercontent.com/yuhongwei380/openclash-rules/main/proxy.list"}
  direct_inc: { <<: *class, url: "https://raw.githubusercontent.com/yuhongwei380/openclash-rules/main/direct.list"}
  
  # AI 规则集
  copilot: { <<: *class_yaml, url: "https://raw.githubusercontent.com/VPSDance/ai-proxy-rules/main/rules/clash/copilot.yaml"}
